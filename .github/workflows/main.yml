name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Node para admin
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install NPM dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
        run: npm ci

      - name: Build admin assets
        run: npm run build

      # 3. PHP / Composer
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, pdo_pgsql
          coverage: none

      - name: Install Composer dependencies
        run: | 
          composer install --no-dev --optimize-autoloader
      - name: Setup SSH key
        run: |
              mkdir -p ~/.ssh
              echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
              chmod 600 ~/.ssh/id_ed25519
              ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts    

      - name: Deploy backend via rsync
        run: |
              rsync -avz --delete \
                  --exclude='.git' \
                  --exclude='node_modules' \
                  --exclude='.env' \
                  --exclude='storage' \
                  --exclude='bootstrap/cache' \
                -e "ssh -i ~/.ssh/id_ed25519 \
                    -p ${{ secrets.VPS_PORT }} \
                    -o HostKeyAlgorithms=+ssh-rsa \
                    -o PubkeyAcceptedAlgorithms=+ssh-rsa" \
                /home/runner/work/api/api/* ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/mindmeet/api/

      # 4. Deploy + comandos (TODO AQUÍ)          
      - name: Run Laravel commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/mindmeet/api

            # Crear carpetas runtime (idempotente)
            mkdir -p bootstrap/cache
            mkdir -p storage/framework/{cache,sessions,views}
            mkdir -p storage/app/
            cp ~/jsons/* storage/app/

            # Permisos correctos
            sudo chown -R ${{secrets.VPS_USER}}:www-data storage bootstrap/cache
            sudo chown -R ${{secrets.VPS_USER}}:www-data ./*
            sudo chmod -R 775 storage bootstrap/cache

            # Dependencias Node requeridas por Browsershot/Puppeteer en produccion.
            # Chromium se usa desde el sistema para evitar descargas pesadas en deploy.
            CHROME_PATH="$(command -v chromium-browser || command -v chromium || command -v google-chrome || true)"
            if [ -z "$CHROME_PATH" ]; then
              echo "No se encontro Chromium/Chrome en el servidor. Instala chromium-browser o google-chrome-stable."
              exit 1
            fi

            PUPPETEER_SKIP_DOWNLOAD=true npm ci --omit=dev --no-audit --no-fund

            if ! grep -q '^BROWSERSHOT_CHROME_PATH=' .env; then
              echo "BROWSERSHOT_CHROME_PATH=$CHROME_PATH" >> .env
            fi

            if ! grep -q '^BROWSERSHOT_NODE_MODULE_PATH=' .env; then
              echo "BROWSERSHOT_NODE_MODULE_PATH=/var/www/mindmeet/api/node_modules" >> .env
            fi
            
            # Laravel cleanup seguro
            php artisan optimize:clear

            # Opcional (solo si quieres cachear en prod)
            php artisan config:cache
            php artisan route:cache
